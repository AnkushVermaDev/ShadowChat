<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Chat App (HTML/CSS/JS)</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --accent:#7c3aed; --muted:#94a3b8; --me:#0ea5a4;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;background:linear-gradient(180deg,#071020 0%, #071428 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .app{width:100%;max-width:980px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;overflow:hidden;display:grid;grid-template-columns:320px 1fr;box-shadow:0 10px 30px rgba(2,6,23,0.6)}
    /* Sidebar */
    .sidebar{padding:18px;background:linear-gradient(180deg, rgba(255,255,255,0.015), transparent);border-right:1px solid rgba(255,255,255,0.03)}
    .title{font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .small{font-size:13px;color:var(--muted)}
    .profile{display:flex;gap:10px;align-items:center;margin:14px 0}
    .avatar{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#06b6d4);display:flex;align-items:center;justify-content:center;font-weight:700}
    .name{font-weight:600}
    .user-input{display:flex;gap:8px;margin-top:10px}
    input[type=text].username{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    button#set-name{padding:8px 10px;border-radius:8px;border:none;background:var(--accent);color:white;cursor:pointer}
    .room-list{margin-top:18px}
    .room{padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid transparent}
    .room:hover{background:rgba(255,255,255,0.01);border-color:rgba(255,255,255,0.02)}
    .room.active{background:linear-gradient(90deg, rgba(124,58,237,0.12), rgba(6,182,212,0.06));border-color:rgba(124,58,237,0.14)}
    /* Chat area */
    .chat{display:flex;flex-direction:column;height:640px}
    .chat-header{padding:18px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between}
    .messages{padding:18px;flex:1;overflow:auto;background:linear-gradient(180deg, rgba(255,255,255,0.005), transparent)}
    .message{max-width:70%;margin-bottom:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.02);position:relative}
    .message.me{margin-left:auto;background:linear-gradient(180deg, rgba(14,165,164,0.12), rgba(124,58,237,0.06));border:1px solid rgba(124,58,237,0.08)}
    .meta{font-size:12px;color:var(--muted);margin-bottom:6px}
    .timestamp{font-size:11px;color:var(--muted);margin-top:6px}
    .composer{padding:12px;border-top:1px solid rgba(255,255,255,0.03);display:flex;gap:8px}
    .composer input[type=text]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .composer button{padding:10px 12px;border-radius:8px;border:none;background:var(--me);color:#042024;cursor:pointer}
    .hint{font-size:13px;color:var(--muted)}
    /* Responsive */
    @media (max-width:720px){.app{grid-template-columns:1fr}.sidebar{display:none}.chat{height:80vh}}
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="Chat app">
    <aside class="sidebar">
      <div class="title">💬 Simple Chat</div>
      <div class="small">Frontend-only demo — uses localStorage to persist messages.</div>

      <div class="profile">
        <div class="avatar" id="avatar">U</div>
        <div>
          <div class="name" id="displayName">Guest</div>
          <div class="small">You can set a name below</div>
        </div>
      </div>

      <div class="user-input">
        <input class="username" id="usernameInput" type="text" placeholder="Enter your name" />
        <button id="set-name">Set</button>
      </div>

      <div class="room-list" id="rooms">
        <!-- Rooms generated by JS -->
      </div>

      <div style="margin-top:18px" class="small">Tip: open the app in two browser windows to simulate two users (different names).</div>
    </aside>

    <section class="chat">
      <div class="chat-header">
        <div>
          <div id="roomTitle" style="font-weight:700">General</div>
          <div class="small" id="roomSubtitle">Public room</div>
        </div>
        <div class="hint">Local demo • no server</div>
      </div>

      <div class="messages" id="messages" tabindex="0" aria-live="polite">
        <!-- messages injected here -->
      </div>

      <div class="composer">
        <input type="text" id="messageInput" placeholder="Type a message and press Enter" autocomplete="off" />
        <button id="sendBtn">Send</button>
      </div>
    </section>
  </div>

  <script>
    /* ====== Simple frontend-only chat app ======
       - Persists rooms, users and messages in localStorage
       - Works across multiple tabs (uses storage event to sync)
       - No backend included (can be wired to WebSocket/HTTP later)
    */

    // --- App state and defaults
    const DEFAULT_ROOMS = [
      {id:'general', name:'General', subtitle:'Public room'},
      {id:'random', name:'Random', subtitle:'Small talk'},
      {id:'dev', name:'Dev', subtitle:'Technical chat'}
    ];

    const $ = sel=>document.querySelector(sel);
    const roomsEl = $('#rooms');
    const messagesEl = $('#messages');
    const usernameInput = $('#usernameInput');
    const setNameBtn = $('#set-name');
    const displayNameEl = $('#displayName');
    const avatarEl = $('#avatar');
    const messageInput = $('#messageInput');
    const sendBtn = $('#sendBtn');
    const roomTitleEl = $('#roomTitle');
    const roomSubtitleEl = $('#roomSubtitle');

    let state = {
      username: localStorage.getItem('chat_username') || 'Guest',
      currentRoom: localStorage.getItem('chat_room') || 'general',
      rooms: JSON.parse(localStorage.getItem('chat_rooms') || 'null') || DEFAULT_ROOMS,
      // messages is an object { roomId: [ {id,author,text,time} ] }
      messages: JSON.parse(localStorage.getItem('chat_messages') || 'null') || {}
    };

    // ensure arrays exist for default rooms
    for(const r of state.rooms) state.messages[r.id] = state.messages[r.id] || [];

    // --- Utilities
    function save(){
      localStorage.setItem('chat_username', state.username);
      localStorage.setItem('chat_room', state.currentRoom);
      localStorage.setItem('chat_rooms', JSON.stringify(state.rooms));
      localStorage.setItem('chat_messages', JSON.stringify(state.messages));
    }

    function uid(){return Math.random().toString(36).slice(2,9)}
    function nowStr(){return new Date().toLocaleString()}

    // --- Rendering
    function renderRooms(){
      roomsEl.innerHTML = '';
      for(const r of state.rooms){
        const d = document.createElement('div');
        d.className = 'room' + (r.id===state.currentRoom? ' active':'');
        d.innerHTML = `<div style="flex:1"><div style="font-weight:600">${escapeHtml(r.name)}</div><div class="small">${escapeHtml(r.subtitle)}</div></div>`;
        d.onclick = ()=>{ state.currentRoom = r.id; save(); render(); }
        roomsEl.appendChild(d);
      }
    }

    function renderMessages(){
      const list = state.messages[state.currentRoom] || [];
      messagesEl.innerHTML = '';
      for(const m of list){
        const el = document.createElement('div');
        el.className = 'message' + (m.author===state.username? ' me':'');
        el.innerHTML = `<div class="meta">${escapeHtml(m.author)}</div><div class="body">${escapeHtml(m.text)}</div><div class="timestamp">${escapeHtml(m.time)}</div>`;
        messagesEl.appendChild(el);
      }
      // scroll to bottom
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function render(){
      displayNameEl.textContent = state.username || 'Guest';
      avatarEl.textContent = (state.username || 'G').slice(0,2).toUpperCase();
      roomTitleEl.textContent = state.rooms.find(r=>r.id===state.currentRoom)?.name || 'Room';
      roomSubtitleEl.textContent = state.rooms.find(r=>r.id===state.currentRoom)?.subtitle || '';
      renderRooms();
      renderMessages();
    }

    // --- Actions
    setNameBtn.onclick = ()=>{
      const v = usernameInput.value.trim();
      if(!v) return alert('Enter a name');
      state.username = v; save(); render(); usernameInput.value='';
    }
    usernameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') setNameBtn.click(); });

    function sendMessage(){
      const text = messageInput.value.trim();
      if(!text) return;
      const msg = { id: uid(), author: state.username || 'Guest', text, time: nowStr() };
      state.messages[state.currentRoom] = state.messages[state.currentRoom] || [];
      state.messages[state.currentRoom].push(msg);
      save();
      // broadcast via localStorage event by writing a small marker
      localStorage.setItem('chat_broadcast', JSON.stringify({event:'message', room:state.currentRoom, msg, t:Date.now()}));
      messageInput.value=''; renderMessages();
    }

    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(); });

    // --- Storage event listener to sync across tabs
    window.addEventListener('storage', ev=>{
      if(ev.key==='chat_broadcast' && ev.newValue){
        try{
          const payload = JSON.parse(ev.newValue);
          if(payload.event==='message'){
            // reload messages from storage (in case of race)
            state.messages = JSON.parse(localStorage.getItem('chat_messages')||'{}');
            // ensure room list messages exist
            for(const r of state.rooms) state.messages[r.id] = state.messages[r.id] || [];
            renderMessages();
          }
        }catch(e){console.warn(e)}
      }
      // if other tab changed username/rooms/messages we can re-read
      if(['chat_username','chat_rooms','chat_messages','chat_room'].includes(ev.key)){
        setTimeout(()=>{
          state.username = localStorage.getItem('chat_username') || state.username;
          state.rooms = JSON.parse(localStorage.getItem('chat_rooms')||'null') || state.rooms;
          state.messages = JSON.parse(localStorage.getItem('chat_messages')||'null') || state.messages;
          state.currentRoom = localStorage.getItem('chat_room') || state.currentRoom;
          render();
        },50)
      }
    });

    // small helper to escape HTML
    function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

    // --- init
    render();

    // expose a simple API for demo/testing in console
    window.__chat = {
      state, save, sendMessage, render
    }

    // create an example message if empty
    if((state.messages[state.currentRoom]||[]).length===0){
      state.messages[state.currentRoom].push({ id: uid(), author:'System', text:'Welcome to the demo chat. Set your name and start typing!', time: nowStr() });
      save(); renderMessages();
    }
  </script>
</body>
  </html>
